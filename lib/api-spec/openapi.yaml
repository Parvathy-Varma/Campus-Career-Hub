openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: University Placement Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: postings
    description: Job postings
  - name: applications
    description: Student applications
  - name: analytics
    description: Placement analytics
  - name: notifications
    description: In-app notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with role-based credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /postings:
    get:
      operationId: listPostings
      tags: [postings]
      summary: List postings (filtered by role)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, closed]
        - name: companyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of postings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Posting"
    post:
      operationId: createPosting
      tags: [postings]
      summary: Create a new posting (company only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posting"

  /postings/{id}:
    get:
      operationId: getPosting
      tags: [postings]
      summary: Get a single posting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posting details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostingDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePosting
      tags: [postings]
      summary: Update a posting (company only, pending state)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostingUpdate"
      responses:
        "200":
          description: Updated posting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posting"

  /postings/{id}/approve:
    patch:
      operationId: approvePosting
      tags: [postings]
      summary: Approve a posting (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posting approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posting"

  /postings/{id}/reject:
    patch:
      operationId: rejectPosting
      tags: [postings]
      summary: Reject a posting (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionInput"
      responses:
        "200":
          description: Posting rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posting"

  /postings/{id}/close:
    patch:
      operationId: closePosting
      tags: [postings]
      summary: Close a posting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Posting closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Posting"

  /postings/{id}/applications:
    get:
      operationId: listPostingApplications
      tags: [applications]
      summary: List applications for a posting (admin or company)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications for the posting
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: applyToPosting
      tags: [applications]
      summary: Apply to a posting (student only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "409":
          description: Already applied

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (student sees own, admin sees all)
      responses:
        "200":
          description: Applications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications/{id}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (company shortlists/selects/rejects)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get overall placement analytics (admin only)
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/companies:
    get:
      operationId: getCompanyAnalytics
      tags: [analytics]
      summary: Get per-company analytics (admin only)
      responses:
        "200":
          description: Per-company analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyAnalytics"

  /analytics/timeline:
    get:
      operationId: getTimelineAnalytics
      tags: [analytics]
      summary: Get monthly application/placement timeline (admin only)
      responses:
        "200":
          description: Timeline analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelinePoint"

  /analytics/postings-summary:
    get:
      operationId: getPostingsSummary
      tags: [analytics]
      summary: Get posting status breakdown (admin only)
      responses:
        "200":
          description: Postings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostingsSummary"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get current user's notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [company, student, admin]
        companyName:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        cgpa:
          type: ["number", "null"]
        graduationYear:
          type: ["integer", "null"]

    Posting:
      type: object
      required: [id, companyId, companyName, title, description, status, deadline, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        companyName:
          type: string
        title:
          type: string
        description:
          type: string
        eligibility:
          type: ["string", "null"]
        minCgpa:
          type: ["number", "null"]
        branches:
          type: ["string", "null"]
        ctc:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        slots:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, closed]
        rejectionReason:
          type: ["string", "null"]
        deadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        applicationCount:
          type: ["integer", "null"]
        hasApplied:
          type: ["boolean", "null"]

    PostingDetail:
      type: object
      required: [id, companyId, companyName, title, description, status, deadline, createdAt, applications]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        companyName:
          type: string
        title:
          type: string
        description:
          type: string
        eligibility:
          type: ["string", "null"]
        minCgpa:
          type: ["number", "null"]
        branches:
          type: ["string", "null"]
        ctc:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        slots:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, closed]
        rejectionReason:
          type: ["string", "null"]
        deadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"

    PostingInput:
      type: object
      required: [title, description, deadline]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        eligibility:
          type: string
        minCgpa:
          type: number
        branches:
          type: string
        ctc:
          type: string
        location:
          type: string
        slots:
          type: integer
        deadline:
          type: string
          format: date-time

    PostingUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        eligibility:
          type: string
        minCgpa:
          type: number
        branches:
          type: string
        ctc:
          type: string
        location:
          type: string
        slots:
          type: integer
        deadline:
          type: string
          format: date-time

    RejectionInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1

    Application:
      type: object
      required: [id, postingId, studentId, status, appliedAt]
      properties:
        id:
          type: integer
        postingId:
          type: integer
        postingTitle:
          type: ["string", "null"]
        companyName:
          type: ["string", "null"]
        studentId:
          type: integer
        studentName:
          type: ["string", "null"]
        studentEmail:
          type: ["string", "null"]
        studentDepartment:
          type: ["string", "null"]
        studentCgpa:
          type: ["number", "null"]
        coverLetter:
          type: ["string", "null"]
        status:
          type: string
          enum: [applied, shortlisted, selected, rejected]
        appliedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApplicationInput:
      type: object
      properties:
        coverLetter:
          type: string

    ApplicationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [applied, shortlisted, selected, rejected]

    AnalyticsOverview:
      type: object
      required: [totalStudents, totalCompanies, totalPostings, approvedPostings, totalApplications, placedStudents, placementRate, pendingApprovals]
      properties:
        totalStudents:
          type: integer
        totalCompanies:
          type: integer
        totalPostings:
          type: integer
        approvedPostings:
          type: integer
        totalApplications:
          type: integer
        placedStudents:
          type: integer
        placementRate:
          type: number
        pendingApprovals:
          type: integer

    CompanyAnalytics:
      type: object
      required: [companyId, companyName, postingCount, applicationCount, selectedCount]
      properties:
        companyId:
          type: integer
        companyName:
          type: string
        postingCount:
          type: integer
        applicationCount:
          type: integer
        selectedCount:
          type: integer

    TimelinePoint:
      type: object
      required: [month, applications, placements]
      properties:
        month:
          type: string
        applications:
          type: integer
        placements:
          type: integer

    PostingsSummary:
      type: object
      required: [pending, approved, rejected, closed]
      properties:
        pending:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        closed:
          type: integer

    Notification:
      type: object
      required: [id, userId, message, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        message:
          type: string
        type:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
